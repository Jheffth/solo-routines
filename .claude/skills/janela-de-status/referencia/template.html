<!-- 1) DEFS GLOBAIS: coloque no TOPO do <body>, fora de páginas escondidas -->
<!-- Filtro de chamas vivas (turbulência animada) — usado pela aura do Arquiteto -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="fx-chamas" x="-60%" y="-60%" width="220%" height="220%">
        <feTurbulence type="fractalNoise" baseFrequency="0.013 0.055" numOctaves="3" seed="7" result="ruido">
          <animate attributeName="baseFrequency" dur="7s"
            values="0.013 0.055;0.018 0.075;0.011 0.05;0.016 0.068;0.013 0.055"
            repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="ruido" scale="42" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <!-- Gradiente do glifo do Sistema (usado nas placas de aquisição) -->
      <linearGradient id="sysGlyphGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#d8b4fe"/>
        <stop offset="60%" stop-color="#a855f7"/>
        <stop offset="100%" stop-color="#22d3ee"/>
      </linearGradient>
    </defs>
  </svg>

<!-- 2) PLACA DE AQUISIÇÃO (substitui .page-header) -->
<!-- ═══ PLACA DE AQUISIÇÃO DO SISTEMA ═══ -->
          <div class="sys-plate">
            <div class="sys-plate-glyph">
              <svg viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
                <path d="M24 2 L44 13 V35 L24 46 L4 35 V13 Z" fill="none"
                  stroke="url(#sysGlyphGrad)" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M24 12 L34 18 V30 L24 36 L14 30 V18 Z" fill="rgba(168,85,247,.18)"
                  stroke="url(#sysGlyphGrad)" stroke-width="1.5"/>
                <circle cx="24" cy="24" r="4" fill="url(#sysGlyphGrad)" class="sys-glyph-core"/>
              </svg>
            </div>
            <div class="sys-plate-texts">
              <h1 class="sys-plate-title">STATUS</h1>
              <div class="sys-plate-sub">
                <span id="dash-data">Hoje</span>
                <span class="sys-plate-sep">·</span>
                <span class="sys-plate-whisper" id="sys-whisper">O Sistema observa seu progresso</span>
              </div>
              <div class="sys-plate-line"></div>
            </div>
            <div class="sys-plate-actions">
              <span id="sys-dungeon-chip" class="sys-chip-dungeon" style="display:none"></span>
              <button class="sys-btn-missao" id="btn-nova-missao">
                <span>+ Nova Missão</span>
              </button>
            </div>
          </div>

<!-- 3) JANELA DO HUNTER (painel principal) -->
<!-- ═══ JANELA DE STATUS DO HUNTER ═══ -->
          <div class="hunter-window" id="hunter-card">
            <canvas class="hunter-window-fx" id="hunter-fx"></canvas>
            <div class="hunter-window-body">

              <!-- Coluna 1: avatar em hexágono de rank -->
              <div class="hunter-hex-wrap">
                <div class="hunter-hex-ring"></div>
                <div class="hunter-hex" id="dash-avatar">&#128737;&#65039;</div>
                <div class="hunter-hex-rank" id="dash-rank-selo">E</div>
              </div>

              <!-- Coluna 2: identidade + XP -->
              <div class="hunter-ident">
                <div class="hunter-nome" id="dash-nome">Hunter</div>
                <div class="hunter-titulo" id="dash-titulo">"O Mais Fraco"</div>
                <div class="hunter-badges" id="dash-rank-badge"></div>

                <div class="hunter-xp">
                  <div class="hunter-xp-top">
                    <span class="hunter-xp-lbl">Progresso para o próximo nível</span>
                    <span class="hunter-xp-val" id="dash-xp-txt">0 / 100 XP</span>
                  </div>
                  <div class="hunter-xp-track">
                    <div class="hunter-xp-fill" id="dash-xp-bar" style="width:0%"></div>
                    <div class="hunter-xp-ticks"></div>
                  </div>
                </div>

                <!-- Relíquias recentes -->
                <div class="hunter-relicario" id="dash-relicario"></div>
              </div>

              <!-- Coluna 3: cristais de status -->
              <div class="hunter-cristais">
                <div class="cristal cristal-nivel">
                  <div class="cristal-gema"><span id="dash-nivel">1</span></div>
                  <div class="cristal-lbl">Nível</div>
                </div>
                <div class="cristal cristal-moedas">
                  <div class="cristal-gema"><span id="dash-moedas">0</span></div>
                  <div class="cristal-lbl">Mana Coins</div>
                </div>
                <div class="cristal cristal-streak">
                  <div class="cristal-gema">
                    <span class="cristal-chama" id="dash-streak-chama">&#128293;</span>
                    <span id="dash-streak">0</span>
                  </div>
                  <div class="cristal-lbl">Streak</div>
                </div>
              </div>
            </div>
      </div>
